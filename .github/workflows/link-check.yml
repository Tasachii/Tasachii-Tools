name: Link check

on:
  push:
    paths: ["**/*.md", ".github/workflows/link-check.yml"]
  pull_request:
    paths: ["**/*.md", ".github/workflows/link-check.yml"]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — catches external links that died since
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # The reference exemplars are illustrative sample READMEs — their
          # relative links (docs/, CONTRIBUTING.md, images, github.com/.../example)
          # are part of the example and intentionally do not resolve in this repo.
          # Check only the real, human-facing docs.
          args: >-
            --no-progress --verbose
            --exclude-path plugins/readme-craft/skills/readme-craft/references
            "**/*.md"
          fail: true

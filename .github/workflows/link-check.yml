name: Link check

on:
  push:
    paths: ["**/*.md", ".github/workflows/link-check.yml"]
  pull_request:
    paths: ["**/*.md", ".github/workflows/link-check.yml"]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — catches external links that died since
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # The reference docs are illustrative skill material — sample links, the
          # template's placeholder link targets (`<!-- TODO -->` markers), and code-block
          # CDN snippets are part of the example and don't resolve as repo doc links.
          # Exclude both reference trees; check only the real, human-facing docs.
          args: >-
            --no-progress --verbose
            --exclude-path plugins/craft-readme/skills/craft-readme/references
            --exclude-path plugins/craft-slides/skills/craft-slides/references
            "**/*.md"
          fail: true

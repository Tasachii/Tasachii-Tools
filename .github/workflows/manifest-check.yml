name: Manifest check

on:
  push:
    paths: ["**/*.json", "**/*.md", "scripts/**", ".github/workflows/manifest-check.yml"]
  pull_request:
    paths: ["**/*.json", "**/*.md", "scripts/**", ".github/workflows/manifest-check.yml"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Plugin versions match the README; marketplace version is semver
        run: python3 scripts/check-versions.py
      - name: Plugin manifests and skill frontmatter are structurally valid
        run: python3 scripts/check-plugins.py
      - name: Guards self-test (pass on repo, catch injected drift)
        run: python3 scripts/test_checks.py
